[entryPoints]
  [entryPoints.web]
    address = ":8088"

  [entryPoints.dashboard]
    address = ":8090"

[api]
  dashboard = true

[log]
  level = "INFO"

[accessLog]
  filePath = "logs/traefik-access.log"
  format = "json"

  [accessLog.fields]
    defaultMode = "keep"

    [accessLog.fields.headers]
      defaultMode = "keep"

[providers.file]
  filename = "dynamic.toml"
  watch = true
